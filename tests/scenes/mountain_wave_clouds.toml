# tests/scenes/mountain_wave_clouds.toml
#
# Plan §11.1 fixture #8 — orographic altocumulus lenticularis. Two
# parallel wave trains downwind of the Cairngorms, encoded as six
# lozenge-shaped patches in the coverage grid sidecar.
#
# v1 caveat: the gridded-coverage *runtime loader* is deferred to v2
# (synthesis falls back to layer.coverage when the grid is configured
# but unread). The TOML fixture documents the intended pattern and the
# loader exercises the path-validation code; the binary is generated by
# `cargo run --example generate_mountain_wave -p ps-app`.

schema_version = 1

[surface]
visibility_m   = 30000.0
temperature_c  = 8.0
dewpoint_c     = -2.0
pressure_hpa   = 1024.0
wind_dir_deg   = 270.0          # strong westerly across the hills
wind_speed_mps = 18.0

[surface.wetness]
ground_wetness  = 0.0
puddle_coverage = 0.0
puddle_start    = 0.6
snow_depth_m    = 0.0

[[clouds.layers]]
type               = "Altocumulus"
base_m             = 4500.0
top_m              = 5500.0
coverage           = 0.65       # max coverage in the lozenges
density_scale      = 0.85
shape_octave_bias  = 0.2        # smoother (no convective cores)
detail_octave_bias = -0.2       # softer edges

[clouds.coverage_grid]
extent_m  = 32000.0
size      = [128, 128]
data_path = "presets/mountain_wave_lozenges_128x128.bin"

[precipitation]
type               = "None"
intensity_mm_per_h = 0.0

[lightning]
strikes_per_min_per_km2 = 0.0
