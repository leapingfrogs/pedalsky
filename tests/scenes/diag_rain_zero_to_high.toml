# Phase 19 diagnostic — load with rain intensity = 0, manually crank
# up via UI slider while running. This scene loads with precip type
# = Rain and intensity = 0; the UI slider should bring rain in.

schema_version = 1

[surface]
visibility_m   = 30000.0
temperature_c  = 15.0
dewpoint_c     = 12.0
pressure_hpa   = 1010.0
wind_dir_deg   = 240.0
wind_speed_mps = 5.0

[surface.wetness]
ground_wetness  = 0.0
puddle_coverage = 0.0
puddle_start    = 0.6
snow_depth_m    = 0.0

[[clouds.layers]]
type               = "Stratus"
base_m             = 500.0
top_m              = 1200.0
coverage           = 0.7
shape_octave_bias  = 0.0
detail_octave_bias = 0.0

[precipitation]
type               = "Rain"
intensity_mm_per_h = 0.0

[lightning]
strikes_per_min_per_km2 = 0.0
