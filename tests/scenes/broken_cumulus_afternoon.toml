                            # Schneider remap dead zone (plan §6 / followup #57)
density_scale      = 1.0
shape_octave_bias  = 0.0
detail_octave_bias = 0.0

[precipitation]
type               = "None"
intensity_mm_per_h = 0.0

[lightning]
