# Phase 12.1 diagnostic — half cumulus, half stratus, split by the
# per-pixel cloud-type override grid. The cloud march should render
# the left half as puffy cumulus (NDF case 0, bell-shaped, peaks at
# h~0.5) and the right half as a thin stratus deck (NDF case 1,
# top-heavy). Demonstrates that the per-pixel cloud_type_grid
# successfully overrides the layer's default cloud_type.
#
# Coverage and type grids generated by:
#   cargo run --example generate_type_split -p ps-app

schema_version = 1

[surface]
visibility_m   = 30000.0
temperature_c  = 17.0
dewpoint_c     = 7.0
pressure_hpa   = 1018.0
wind_dir_deg   = 240.0
wind_speed_mps = 5.0

[surface.wetness]
ground_wetness  = 0.0
puddle_coverage = 0.0
puddle_start    = 0.6
snow_depth_m    = 0.0

# Single layer with a generous vertical extent that accommodates both
# Cumulus (peaks ~0.5 of layer height) and Stratus (peaks ~0.3).
# cloud_type here is the *fallback* — the per-pixel override in the
# type grid takes precedence.
[[clouds.layers]]
type               = "Cumulus"
base_m             = 800.0
top_m              = 1800.0
coverage           = 0.65
density_scale      = 1.0
shape_octave_bias  = 0.0
detail_octave_bias = 0.0

[clouds.coverage_grid]
extent_m  = 32000.0
size      = [128, 128]
data_path = "presets/coverage_split_128x128.bin"
type_path = "presets/type_split_128x128.bin"

[precipitation]
type               = "None"
intensity_mm_per_h = 0.0

[lightning]
strikes_per_min_per_km2 = 0.0
